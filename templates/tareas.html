{% extends "base.html" %}
{% block contenido %}

<div class="container mt-4">
    <h2 class="text-center">Mis tareas</h2>
    <form method="POST" action="/tareas" class="mb-4">
        <input type="text" name="titulo" class="form-control mb-2" placeholder="Nueva tarea">
        <button type="submit" class="btn btn-success w-100">Agregar</button>
    </form>

    #Lista de tareas
    <div>
        {% for tarea in tareas %}
            <div class="card mb-2 p-2">
                <h5>{{ tarea.titulo }}</h5>
                <small>{{ tarea.estado }}</small>
            </div>
        {% endfor %}
    </div>

</div>


{% endblock %}
